version: '3.8'

services:
  sbert-service:
    build: .
    container_name: sbert-service
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
    volumes:
      # Cache the model to avoid re-downloading
      - model-cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  model-cache:
    driver: local
